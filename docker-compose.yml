version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: inventory_db_container
    restart: always
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: inventory_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: fastapi_backend_container
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin_user:secure_password_123@db:5432/inventory_db
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: react_frontend_container
    restart: always
    ports:
      - "3000:8080"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata: